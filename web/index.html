<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>智能投资分析</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .app { display: flex; flex-direction: column; height: 100%; }
    .header { background: linear-gradient(135deg, #1976D2, #42A5F5); color: white; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-shrink: 0; }
    .header h1 { font-size: 17px; font-weight: 500; }
    .tabs { display: flex; background: white; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
    .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #1976D2; border-bottom-color: #1976D2; font-weight: 500; }
    .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .pages { flex: 1; overflow-y: auto; padding: 12px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stock-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .stock-row:last-child { border-bottom: none; }
    .stock-left { flex: 1; }
    .stock-name { font-size: 15px; font-weight: 500; }
    .stock-info { font-size: 12px; color: #999; margin-top: 4px; }
    .stock-right { text-align: right; }
    .stock-price { font-size: 15px; font-weight: 600; }
    .stock-change { font-size: 13px; font-weight: 500; margin-top: 2px; }
    .up { color: #F44336; }
    .down { color: #4CAF50; }
    .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 4px; }
    .tag-green { background: #E8F5E9; color: #388E3C; }
    .tag-blue { background: #E3F2FD; color: #1976D2; }
    .tag-orange { background: #FFF3E0; color: #F57C00; }
    .section-title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 10px; }
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .btn { background: #1976D2; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
    .btn-outline { background: white; border: 1px solid #1976D2; color: #1976D2; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    /* 弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.show { display: block; }
    .modal-bg { position: absolute; width: 100%; height: 100%; }
    .modal-body { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 16px 16px 0 0; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { width: 32px; height: 32px; text-align: center; line-height: 32px; font-size: 20px; color: #999; }
    .detail-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f5f5f5; }
    .detail-label { color: #666; }
    .detail-value { font-weight: 500; }
    .detail-link { display: block; text-align: center; color: #1976D2; padding: 14px; text-decoration: none; font-size: 14px; }
    /* 持仓 */
    .position-card { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .position-card:last-child { border-bottom: none; }
    .position-info { flex: 1; }
    .position-name { font-weight: 500; }
    .position-hold { font-size: 12px; color: #666; margin-top: 4px; }
    .position-right { text-align: right; }
    .profit-up { color: #F44336; }
    .profit-down { color: #4CAF50; }
    .position-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    /* 表单 */
    .form-group { padding: 0 20px; margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-btns { display: flex; gap: 12px; padding: 0 20px 20px; }
    .form-btns .btn { flex: 1; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header"><h1>📊 智能投资分析</h1></div>
    <div class="tabs">
      <div class="tab active" data-page="0"><span class="tab-icon">📈</span>市场</div>
      <div class="tab" data-page="1"><span class="tab-icon">📉</span>股票</div>
      <div class="tab" data-page="2"><span class="tab-icon">💰</span>基金</div>
      <div class="tab" data-page="3"><span class="tab-icon">💼</span>持仓</div>
    </div>
    <div class="pages">
      <div class="page active" id="page-0">
        <div class="section-title">📊 指数行情</div>
        <div id="indices"></div>
      </div>
      <div class="page" id="page-1">
        <div class="section-title">📉 个股行情 <span style="font-size:12px;color:#999;font-weight:normal;">点击查看详情</span></div>
        <div id="stocks"></div>
      </div>
      <div class="page" id="page-2">
        <div class="section-title">💰 基金估值 <span style="font-size:12px;color:#999;font-weight:normal;">点击查看详情</span></div>
        <div id="funds"></div>
      </div>
      <div class="page" id="page-3">
        <div id="portfolio-content"></div>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div id="detail-modal" class="modal">
    <div class="modal-bg" onclick="closeModal()"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="detail-title"></span>
        <span class="modal-close" onclick="closeModal()">×</span>
      </div>
      <div id="detail-body"></div>
      <a id="detail-link" class="detail-link" href="" target="_blank">🔗 查看详细分析报告</a>
    </div>
  </div>

  <!-- 交易弹窗 -->
  <div id="trade-modal" class="modal">
    <div class="modal-bg" onclick="closeTradeModal()"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="trade-title"></span>
        <span class="modal-close" onclick="closeTradeModal()">×</span>
      </div>
      <div class="form-group">
        <label class="form-label">代码</label>
        <input class="form-input" id="trade-code" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">价格</label>
        <input class="form-input" id="trade-price" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">数量</label>
        <input class="form-input" id="trade-amount" type="number" placeholder="股/份">
      </div>
      <div class="form-btns">
        <button class="btn" onclick="doTrade('buy')">买入</button>
        <button class="btn btn-outline" onclick="doTrade('sell')">卖出</button>
      </div>
    </div>
  </div>

  <script>
    const indices = [
      {name: '上证指数', price: 3995.00, change: 2.70},
      {name: '沪深300', price: 4595.56, change: 3.49},
      {name: '创业板指', price: 3347.61, change: 5.91},
      {name: '恒生指数', price: 25893.02, change: 3.09}
    ];
    const stocks = [
      {name: '贵州茅台', code: '600519', price: 1465.02, change: 1.74, pe: 20.38, vol: 24500, amount: 156.8, desc: '中国白酒龙头企业'},
      {name: '中国平安', code: '601318', price: 59.45, change: 4.87, pe: 7.99, vol: 89500, amount: 52.3, desc: '综合性金融保险集团'},
      {name: '招商银行', code: '600036', price: 39.62, change: 1.62, pe: 6.65, vol: 32800, amount: 41.2, desc: '中国领先的商业银行'},
      {name: '五粮液', code: '000858', price: 104.19, change: 1.05, pe: 14.22, vol: 18200, amount: 28.5, desc: '浓香型白酒龙头企业'},
      {name: '美的集团', code: '000333', price: 76.73, change: 0.80, pe: 13.28, vol: 25600, amount: 38.9, desc: '家电制造龙头企业'},
      {name: '兴业银行', code: '601166', price: 18.78, change: 1.35, pe: 5.13, vol: 45600, amount: 32.1, desc: '股份制商业银行'},
      {name: '中信证券', code: '600030', price: 24.70, change: 3.26, pe: 12.17, vol: 38400, amount: 45.6, desc: '券商业龙头'},
      {name: '伊利股份', code: '600887', price: 26.44, change: 0.42, pe: 20.88, vol: 19200, amount: 26.8, desc: '乳制品行业龙头'},
      {name: '恒瑞医药', code: '600276', price: 57.45, change: 2.37, pe: 49.45, vol: 22100, amount: 35.2, desc: '创新药龙头企业'},
      {name: '中国中免', code: '601888', price: 69.99, change: 2.96, pe: 40.55, vol: 15800, amount: 42.5, desc: '免税行业龙头'}
    ];
    const funds = [
      {name: '5G通信ETF', code: '515050', nav: 2.5435, change: 7.31, score: 95, type: '股票ETF', manager: '华夏基金', link: 'https://fund.eastmoney.com/515050.html'},
      {name: 'AI ETF', code: '159819', nav: 1.5661, change: 7.13, score: 90, type: '股票ETF', manager: '易方达', link: 'https://fund.eastmoney.com/159819.html'},
      {name: '科技ETF', code: '515000', nav: 1.0381, change: 6.67, score: 90, type: '股票ETF', manager: '华宝基金', link: 'https://fund.eastmoney.com/515000.html'},
      {name: '科创50ETF', code: '588000', nav: 1.4253, change: 6.18, score: 90, type: '股票ETF', manager: '华夏基金', link: 'https://fund.eastmoney.com/588000.html'},
      {name: '创业板ETF', code: '159915', nav: 3.3397, change: 5.91, score: 90, type: '股票ETF', manager: '易方达', link: 'https://fund.eastmoney.com/159915.html'},
      {name: '中证500ETF', code: '510500', nav: 8.0123, change: 4.94, score: 95, type: '股票ETF', manager: '南方基金', link: 'https://fund.eastmoney.com/510500.html'},
      {name: '证券ETF', code: '512880', nav: 1.0546, change: 3.96, score: 95, type: '股票ETF', manager: '国泰基金', link: 'https://fund.eastmoney.com/512880.html'},
      {name: '沪深300ETF', code: '510300', nav: 4.6051, change: 3.49, score: 95, type: '股票ETF', manager: '华泰柏瑞', link: 'https://fund.eastmoney.com/510300.html'},
      {name: '恒生ETF', code: '159920', nav: 1.5407, change: 2.94, score: 90, type: '港股ETF', manager: '华夏基金', link: 'https://fund.eastmoney.com/159920.html'},
      {name: '上证50ETF', code: '510050', nav: 2.9806, change: 2.70, score: 95, type: '股票ETF', manager: '华夏基金', link: 'https://fund.eastmoney.com/510050.html'}
    ];
    let portfolio = [
      {type: 'stock', name: '兴业银行', code: '601166', price: 18.78, amount: 1000, cost: 18.20},
      {type: 'stock', name: '招商银行', code: '600036', price: 39.62, amount: 500, cost: 38.50},
      {type: 'fund', name: '沪深300ETF', code: '510300', price: 4.6051, amount: 2000, cost: 4.20}
    ];
    let cash = 50000;
    let currentItem = null;

    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        const page = this.dataset.page;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('page-' + page).classList.add('active');
        if (page === '3') renderPortfolio();
      });
    });

    function fmt(n, d=2) { return (n||0).toFixed(d); }

    function renderIndices() {
      document.getElementById('indices').innerHTML = indices.map(i => {
        const up = i.change >= 0;
        return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="color:#666;font-size:14px;">'+i.name+'</div><div style="font-size:18px;font-weight:600;margin-top:4px;">¥'+fmt(i.price)+'</div></div><div class="'+(up?'up':'down')+'" style="font-size:16px;font-weight:600;">'+(up?'▲':'▼')+fmt(i.change)+'%</div></div></div>';
      }).join('');
    }

    function renderStocks() {
      document.getElementById('stocks').innerHTML = stocks.map((s, i) => {
        const up = s.change >= 0;
        const peTag = s.pe<10?'<span class="tag tag-green">低估</span>':s.pe<20?'<span class="tag tag-blue">正常</span>':'<span class="tag tag-orange">偏高</span>';
        return '<div class="card"><div class="stock-row" data-idx="'+i+'"><div class="stock-left"><div class="stock-name">'+s.name+'</div><div class="stock-info">'+s.code+' · PE:'+fmt(s.pe)+' '+peTag+'</div></div><div class="stock-right"><div class="stock-price">¥'+fmt(s.price)+'</div><div class="stock-change '+(up?'up':'down')+'">'+(up?'+':'')+fmt(s.change)+'%</div></div></div></div>';
      }).join('');
      document.querySelectorAll('#stocks .stock-row').forEach(el => {
        el.addEventListener('click', () => showStockDetail(parseInt(el.dataset.idx)));
      });
    }

    function renderFunds() {
      document.getElementById('funds').innerHTML = funds.map((f, i) => {
        const up = f.change >= 0;
        return '<div class="card"><div class="stock-row" data-idx="'+i+'"><div class="stock-left"><div class="stock-name">'+f.name+'</div><div class="stock-info">'+f.code+' · 净值:'+fmt(f.nav,4)+'</div></div><div class="stock-right"><div class="stock-change '+(up?'up':'down')+'" style="font-size:16px;">'+(up?'+':'')+fmt(f.change)+'%</div></div></div></div>';
      }).join('');
      document.querySelectorAll('#funds .stock-row').forEach(el => {
        el.addEventListener('click', () => showFundDetail(parseInt(el.dataset.idx)));
      });
    }

    function renderPortfolio() {
      const el = document.getElementById('portfolio-content');
      let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-size:14px;font-weight:500;">💼 我的持仓</div><div style="color:#666;font-size:13px;">现金: ¥'+fmt(cash)+'</div></div><div class="card">';
      if (!portfolio.length) {
        html += '<div class="empty"><div class="empty-icon">💼</div><div>暂无持仓</div></div>';
      } else {
        portfolio.forEach((p, i) => {
          const profit = (p.price - p.cost) * p.amount;
          const pct = ((p.price - p.cost) / p.cost * 100);
          const up = profit >= 0;
          html += '<div class="position-card"><div class="position-info"><div class="position-name">'+p.name+'</div><div class="position-hold">'+p.code+' · '+p.amount+'股/份 · 成本:¥'+fmt(p.cost)+'</div></div><div class="position-right"><div class="'+(up?'profit-up':'profit-down')+'">'+(up?'+':'')+fmt(profit)+' ('+fmt(pct)+'%)</div><div class="position-actions"><button class="btn btn-small btn-outline" data-idx="'+i+'">交易</button></div></div></div>';
        });
      }
      html += '</div><div style="text-align:center;margin-top:16px;"><button class="btn" onclick="showTradeForm()">+ 添加模拟持仓</button></div>';
      el.innerHTML = html;
      document.querySelectorAll('#portfolio-content .btn-outline').forEach(el => {
        el.addEventListener('click', () => openTradeModal(parseInt(el.dataset.idx)));
      });
    }

    function showStockDetail(idx) {
      const s = stocks[idx];
      const up = s.change >= 0;
      document.getElementById('detail-title').textContent = s.name;
      document.getElementById('detail-body').innerHTML = 
        '<div class="detail-row"><span class="detail-label">代码</span><span class="detail-value">'+s.code+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">价格</span><span class="detail-value">¥'+fmt(s.price)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">涨跌</span><span class="detail-value '+(up?'up':'down')+'">'+(up?'+':'')+fmt(s.change)+'%</span></div>'+
        '<div class="detail-row"><span class="detail-label">市盈率</span><span class="detail-value">'+fmt(s.pe)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">成交量</span><span class="detail-value">'+fmt(s.vol/10000)+'万手</span></div>'+
        '<div class="detail-row"><span class="detail-label">成交额</span><span class="detail-value">'+fmt(s.amount)+'亿</span></div>'+
        '<div class="detail-row"><span class="detail-label">简介</span><span class="detail-value" style="font-size:13px;">'+s.desc+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">估值</span><span class="detail-value">'+(s.pe<10?'🔥 低估':s.pe<20?'✅ 正常':'⚠️ 偏高')+'</span></div>';
      document.getElementById('detail-link').href = 'https://quote.eastmoney.com/sh'+s.code+'.html';
      document.getElementById('detail-modal').classList.add('show');
    }

    function showFundDetail(idx) {
      const f = funds[idx];
      const up = f.change >= 0;
      document.getElementById('detail-title').textContent = f.name;
      document.getElementById('detail-body').innerHTML = 
        '<div class="detail-row"><span class="detail-label">代码</span><span class="detail-value">'+f.code+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">'+f.type+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">公司</span><span class="detail-value">'+f.manager+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">净值</span><span class="detail-value">'+fmt(f.nav,4)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">涨跌</span><span class="detail-value '+(up?'up':'down')+'">'+(up?'+':'')+fmt(f.change)+'%</span></div>'+
        '<div class="detail-row"><span class="detail-label">评分</span><span class="detail-value">'+f.score+'分</span></div>';
      document.getElementById('detail-link').href = f.link;
      document.getElementById('detail-modal').classList.add('show');
    }

    function closeModal() { document.getElementById('detail-modal').classList.remove('show'); }
    function closeTradeModal() { document.getElementById('trade-modal').classList.remove('show'); }

    function openTradeModal(idx) {
      currentItem = {idx, ...portfolio[idx]};
      document.getElementById('trade-title').textContent = portfolio[idx].name + ' - 交易';
      document.getElementById('trade-code').value = portfolio[idx].code;
      document.getElementById('trade-price').value = '¥' + fmt(portfolio[idx].price);
      document.getElementById('trade-amount').value = '';
      document.getElementById('trade-modal').classList.add('show');
    }

    function showTradeForm() {
      currentItem = null;
      document.getElementById('trade-title').textContent = '新建持仓';
      document.getElementById('trade-code').value = '';
      document.getElementById('trade-price').value = '';
      document.getElementById('trade-amount').value = '';
      document.getElementById('trade-modal').classList.add('show');
    }

    function doTrade(action) {
      const amount = parseInt(document.getElementById('trade-amount').value);
      if (!amount || amount <= 0) { alert('请输入有效数量'); return; }
      if (currentItem) {
        const idx = currentItem.idx;
        if (action === 'sell') {
          if (amount > portfolio[idx].amount) { alert('持仓不足'); return; }
          cash += portfolio[idx].price * amount;
          portfolio[idx].amount -= amount;
          if (!portfolio[idx].amount) portfolio.splice(idx, 1);
          alert('卖出成功');
        } else {
          const cost = portfolio[idx].price * amount;
          if (cost > cash) { alert('现金不足'); return; }
          cash -= cost;
          const na = portfolio[idx].amount + amount;
          portfolio[idx].cost = (portfolio[idx].cost * portfolio[idx].amount + cost) / na;
          portfolio[idx].amount = na;
          alert('买入成功');
        }
      } else {
        const code = document.getElementById('trade-code').value.trim();
        if (!code) { alert('请输入代码'); return; }
        let item = stocks.find(s => s.code === code) || funds.find(f => f.code === code);
        if (!item) { alert('未找到'); return; }
        const cost = item.price * amount;
        if (cost > cash) { alert('现金不足'); return; }
        cash -= cost;
        portfolio.push({type: 'stock', name: item.name, code: item.code, price: item.price, amount: amount, cost: item.price});
        alert('买入成功');
      }
      closeTradeModal();
      renderPortfolio();
    }

    renderIndices();
    renderStocks();
    renderFunds();
  </script>
</body>
</html>
