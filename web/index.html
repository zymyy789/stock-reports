<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>智能投资分析</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }
    .app { display: flex; flex-direction: column; height: 100%; }
    .header { background: linear-gradient(135deg, #1976D2, #42A5F5); color: white; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-shrink: 0; }
    .header h1 { font-size: 17px; font-weight: 500; }
    .tabs { display: flex; background: white; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
    .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #1976D2; border-bottom-color: #1976D2; font-weight: 500; }
    .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .pages { flex: 1; overflow-y: auto; padding: 12px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .row:last-child { border-bottom: none; }
    .row-left { flex: 1; }
    .row-name { font-size: 15px; font-weight: 500; }
    .row-info { font-size: 12px; color: #999; margin-top: 4px; }
    .row-right { text-align: right; }
    .price { font-size: 15px; font-weight: 600; }
    .change { font-size: 13px; font-weight: 500; margin-top: 2px; }
    .up { color: #F44336; }
    .down { color: #4CAF50; }
    .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 4px; }
    .tag-green { background: #E8F5E9; color: #388E3C; }
    .tag-blue { background: #E3F2FD; color: #1976D2; }
    .tag-orange { background: #FFF3E0; color: #F57C00; }
    .tag-red { background: #FFEBEE; color: #D32F2F; }
    .title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 10px; }
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .btn { background: #1976D2; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
    .btn-outline { background: white; border: 1px solid #1976D2; color: #1976D2; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .summary { background: linear-gradient(135deg, #1976D2, #42A5F5); color: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .summary-title { font-size: 14px; opacity: 0.9; }
    .summary-value { font-size: 24px; font-weight: 600; margin-top: 4px; }
    .summary-change { font-size: 14px; margin-top: 4px; opacity: 0.9; }
    /* 弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.show { display: block; }
    .modal-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: pointer; }
    .modal-body { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 16px 16px 0 0; max-height: 85vh; overflow-y: auto; z-index: 2; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { width: 32px; height: 32px; text-align: center; line-height: 32px; font-size: 20px; color: #999; }
    .detail-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f5f5f5; }
    .detail-label { color: #666; }
    .detail-value { font-weight: 500; }
    .detail-link { display: block; text-align: center; color: #1976D2; padding: 14px; text-decoration: none; }
    .form-group { padding: 0 20px; margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-btns { display: flex; gap: 12px; padding: 0 20px 20px; }
    .form-btns .btn { flex: 1; }
    .signal { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-right: 4px; }
    .signal-buy { background: #FFEBEE; color: #D32F2F; }
    .signal-sell { background: #E8F5E9; color: #388E3C; }
    .loading { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header"><h1>📊 智能投资分析</h1></div>
    <div class="tabs">
      <div class="tab active" data-page="0"><span class="tab-icon">📈</span>市场</div>
      <div class="tab" data-page="1"><span class="tab-icon">📉</span>股票</div>
      <div class="tab" data-page="2"><span class="tab-icon">💰</span>基金</div>
      <div class="tab" data-page="3"><span class="tab-icon">💼</span>持仓</div>
    </div>
    <div class="pages">
      <div class="page active" id="page-0">
        <div class="title">📊 指数行情</div>
        <div id="indices"><div class="loading">加载中...</div></div>
        <div class="title" style="margin-top:16px;">📥 今日信号</div>
        <div id="signals"><div class="loading">加载中...</div></div>
      </div>
      <div class="page" id="page-1">
        <div class="title">📉 个股行情 <span style="font-size:12px;color:#999;font-weight:normal;">点击查看详情</span></div>
        <div id="stocks"><div class="loading">加载中...</div></div>
      </div>
      <div class="page" id="page-2">
        <div class="title">💰 基金估值 <span style="font-size:12px;color:#999;font-weight:normal;">点击查看详情</span></div>
        <div id="funds"><div class="loading">加载中...</div></div>
      </div>
      <div class="page" id="page-3">
        <div id="portfolio"><div class="loading">加载中...</div></div>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div id="detail-modal" class="modal">
    <div class="modal-bg" onclick="closeModal()"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="detail-title"></span>
        <span class="modal-close" onclick="closeModal()">×</span>
      </div>
      <div id="detail-body"></div>
      <a id="detail-link" class="detail-link" href="" target="_blank">🔗 查看详细分析报告</a>
    </div>
  </div>

  <!-- 交易弹窗 -->
  <div id="trade-modal" class="modal">
    <div class="modal-bg" onclick="closeTradeModal()"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="trade-title"></span>
        <span class="modal-close" onclick="closeTradeModal()">×</span>
      </div>
      <div class="form-group">
        <label class="form-label">代码</label>
        <input class="form-input" id="trade-code" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">价格</label>
        <input class="form-input" id="trade-price" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">数量(手=100股)</label>
        <input class="form-input" id="trade-amount" type="number" placeholder="请输入数量">
      </div>
      <div class="form-btns">
        <button class="btn" onclick="doTrade('buy')">买入</button>
        <button class="btn btn-outline" onclick="doTrade('sell')">卖出</button>
      </div>
    </div>
  </div>

  <script>
    // 静态数据（与每日报告同步）
    const indicesData = [
      {name: '上证指数', price: 3965.67, change: -0.73},
      {name: '沪深300', price: 4555.59, change: -0.87},
      {name: '创业板指', price: 3311.44, change: -1.08}
    ];
    
    const stocksData = [
      {name: '兴业银行', code: '601166', price: 18.65, change: -0.35, pe: 5.09, desc: '股份制商业银行，低PE'},
      {name: '招商银行', code: '600036', price: 39.27, change: -0.45, pe: 6.59, desc: '中国领先的商业银行'},
      {name: '中国平安', code: '601318', price: 58.34, change: 0.25, pe: 7.84, desc: '综合性金融保险集团'},
      {name: '中信证券', code: '600030', price: 24.28, change: -0.82, pe: 12.0, desc: '券商业龙头'},
      {name: '伊利股份', code: '600887', price: 26.04, change: 0.18, pe: 20.6, desc: '乳制品行业龙头'},
      {name: '五粮液', code: '000858', price: 104.12, change: 0.52, pe: 14.1, desc: '浓香型白酒龙头企业'},
      {name: '美的集团', code: '000333', price: 76.35, change: -0.22, pe: 13.1, desc: '家电制造龙头企业'},
      {name: '贵州茅台', code: '600519', price: 1457.0, change: 0.85, pe: 20.27, desc: '中国白酒龙头企业'},
      {name: '恒瑞医药', code: '600276', price: 57.12, change: 1.25, pe: 48.5, desc: '创新药龙头企业'},
      {name: '中国中免', code: '601888', price: 69.85, change: -0.65, pe: 40.2, desc: '免税行业龙头'}
    ];
    
    const fundsData = [
      {name: '5G通信ETF', code: '515050', nav: 2.5435, change: 2.15, score: 95, manager: '华夏基金'},
      {name: 'AI ETF', code: '159819', nav: 1.5661, change: 1.89, score: 90, manager: '易方达'},
      {name: '科技ETF', code: '515000', nav: 1.0381, change: 1.45, score: 90, manager: '华宝基金'},
      {name: '科创50ETF', code: '588000', nav: 1.4253, change: 1.28, score: 90, manager: '华夏基金'},
      {name: '创业板ETF', code: '159915', nav: 3.3397, change: -0.85, score: 90, manager: '易方达'},
      {name: '中证500ETF', code: '510500', nav: 8.0123, change: 0.52, score: 95, manager: '南方基金'},
      {name: '证券ETF', code: '512880', nav: 1.0546, change: -1.25, score: 95, manager: '国泰基金'},
      {name: '沪深300ETF', code: '510300', nav: 4.6051, change: -0.87, score: 95, manager: '华泰柏瑞'},
      {name: '恒生ETF', code: '159920', nav: 1.5407, change: 0.45, score: 90, manager: '华夏基金'},
      {name: '上证50ETF', code: '510050', nav: 2.9806, change: -0.73, score: 95, manager: '华夏基金'}
    ];
    
    // 模拟持仓数据
    let portfolioData = {
      cash: 55463,
      total_value: 44507,
      total_profit: -30,
      total_profit_pct: -0.07,
      total_assets: 99970,
      positions: [
        {code: '601166', name: '兴业银行', cost: 18.66, price: 18.65, amount: 600, profit: -24, profit_pct: -0.21},
        {code: '600036', name: '招商银行', cost: 39.27, price: 39.27, amount: 300, profit: 3, profit_pct: 0.01},
        {code: '601318', name: '中国平安', cost: 58.36, price: 58.34, amount: 200, profit: -8, profit_pct: -0.07},
        {code: '600030', name: '中信证券', cost: 24.28, price: 24.28, amount: 300, profit: -3, profit_pct: -0.02},
        {code: '600887', name: '伊利股份', cost: 26.04, price: 26.04, amount: 100, profit: 2, profit_pct: 0.08}
      ]
    };
    
    // 买卖信号
    const buySignals = [
      {name: '五粮液', code: '000858', pe: 14.1, price: 104.12, reason: 'PE偏低，建议买入'},
      {name: '美的集团', code: '000333', pe: 13.1, price: 76.35, reason: 'PE偏低，建议买入'}
    ];
    
    let currentTradeItem = null;

    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        const page = this.dataset.page;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('page-' + page).classList.add('active');
      });
    });

    function fmt(n, d=2) { return (n||0).toFixed(d); }

    // 渲染指数
    function renderIndices() {
      document.getElementById('indices').innerHTML = indicesData.map(i => {
        const up = i.change >= 0;
        return '<div class="card"><div class="row"><div class="row-left"><div class="row-name">'+i.name+'</div></div><div class="row-right"><div class="price">'+fmt(i.price)+'</div><div class="change '+(up?'up':'down')+'">'+(up?'+':'')+fmt(i.change)+'%</div></div></div></div>';
      }).join('');
    }

    // 渲染信号
    function renderSignals() {
      let html = '<div class="card">';
      if (buySignals.length > 0) {
        buySignals.forEach(s => {
          html += '<div class="row"><div class="row-left"><div class="row-name">'+s.name+' <span class="signal signal-buy">买入</span></div><div class="row-info">PE:'+fmt(s.pe)+' · '+s.reason+'</div></div><div class="row-right"><div class="price">'+fmt(s.price)+'</div></div></div>';
        });
      }
      html += '</div>';
      document.getElementById('signals').innerHTML = html;
    }

    // 渲染股票
    function renderStocks() {
      document.getElementById('stocks').innerHTML = stocksData.map((s, i) => {
        const up = s.change >= 0;
        const peTag = s.pe<10?'<span class="tag tag-green">低估</span>':s.pe<20?'<span class="tag tag-blue">正常</span>':'<span class="tag tag-orange">偏高</span>';
        return '<div class="card"><div class="row" onclick="showStockDetail('+i+')"><div class="row-left"><div class="row-name">'+s.name+'</div><div class="row-info">'+s.code+' · PE:'+fmt(s.pe)+peTag+'</div></div><div class="row-right"><div class="price">¥'+fmt(s.price)+'</div><div class="change '+(up?'up':'down')+'">'+(up?'+':'')+fmt(s.change)+'%</div></div></div></div>';
      }).join('');
    }

    // 渲染基金
    function renderFunds() {
      document.getElementById('funds').innerHTML = fundsData.map((f, i) => {
        const up = f.change >= 0;
        return '<div class="card"><div class="row" onclick="showFundDetail('+i+')"><div class="row-left"><div class="row-name">'+f.name+'</div><div class="row-info">'+f.code+' · 净值:'+fmt(f.nav,4)+'</div></div><div class="row-right"><div class="change '+(up?'up':'down')+'" style="font-size:15px;">'+(up?'+':'')+fmt(f.change)+'%</div></div></div></div>';
      }).join('');
    }

    // 渲染持仓
    function renderPortfolio() {
      let html = '<div class="summary"><div class="summary-title">总资产</div><div class="summary-value">¥'+fmt(portfolioData.total_assets)+'</div><div class="summary-change">盈亏: '+(portfolioData.total_profit>=0?'+':'')+fmt(portfolioData.total_profit)+' ('+(portfolioData.total_profit_pct>=0?'+':'')+fmt(portfolioData.total_profit_pct)+'%) · 现金:¥'+fmt(portfolioData.cash)+'</div></div>';
      
      html += '<div class="title">💼 持仓明细</div><div class="card">';
      if (portfolioData.positions.length === 0) {
        html += '<div class="empty">暂无持仓<br><button class="btn btn-small" style="margin-top:12px;" onclick="showTradeForm()">模拟买入</button></div>';
      } else {
        portfolioData.positions.forEach((p, i) => {
          const up = p.profit >= 0;
          html += '<div class="row"><div class="row-left"><div class="row-name">'+p.name+'</div><div class="row-info">'+p.code+' · '+p.amount+'股 · 成本:¥'+fmt(p.cost)+'</div></div><div class="row-right"><div class="change '+(up?'up':'down')+'">'+(up?'+':'')+fmt(p.profit)+' ('+(up?'+':'')+fmt(p.profit_pct)+'%)</div></div>';
        });
      }
      html += '</div><div style="text-align:center;margin-top:16px;"><button class="btn" onclick="showTradeForm()">+ 模拟交易</button></div>';
      
      document.getElementById('portfolio').innerHTML = html;
    }

    // 详情
    function showStockDetail(idx) {
      const s = stocksData[idx];
      const up = s.change >= 0;
      document.getElementById('detail-title').textContent = s.name;
      document.getElementById('detail-body').innerHTML = 
        '<div class="detail-row"><span class="detail-label">代码</span><span class="detail-value">'+s.code+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">价格</span><span class="detail-value">¥'+fmt(s.price)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">涨跌</span><span class="detail-value '+(up?'up':'down')+'">'+(up?'+':'')+fmt(s.change)+'%</span></div>'+
        '<div class="detail-row"><span class="detail-label">市盈率</span><span class="detail-value">'+fmt(s.pe)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">估值</span><span class="detail-value">'+(s.pe<10?'🔥 低估':s.pe<20?'✅ 正常':'⚠️ 偏高')+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">简介</span><span class="detail-value" style="font-size:13px;">'+s.desc+'</span></div>';
      document.getElementById('detail-link').href = 'https://quote.eastmoney.com/sh'+s.code+'.html';
      document.getElementById('detail-modal').classList.add('show');
    }

    function showFundDetail(idx) {
      const f = fundsData[idx];
      const up = f.change >= 0;
      document.getElementById('detail-title').textContent = f.name;
      document.getElementById('detail-body').innerHTML = 
        '<div class="detail-row"><span class="detail-label">代码</span><span class="detail-value">'+f.code+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">管理人</span><span class="detail-value">'+f.manager+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">净值</span><span class="detail-value">'+fmt(f.nav,4)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">涨跌</span><span class="detail-value '+(up?'up':'down')+'">'+(up?'+':'')+fmt(f.change)+'%</span></div>'+
        '<div class="detail-row"><span class="detail-label">评分</span><span class="detail-value">'+f.score+'</span></div>';
      document.getElementById('detail-link').href = 'https://fund.eastmoney.com/'+f.code+'.html';
      document.getElementById('detail-modal').classList.add('show');
    }

    function closeModal() { document.getElementById('detail-modal').classList.remove('show'); }
    function closeTradeModal() { document.getElementById('trade-modal').classList.remove('show'); }

    function showTradeForm() {
      currentTradeItem = null;
      document.getElementById('trade-title').textContent = '模拟交易';
      document.getElementById('trade-code').value = '';
      document.getElementById('trade-price').value = '';
      document.getElementById('trade-amount').value = '';
      document.getElementById('trade-modal').classList.add('show');
    }

    function doTrade(action) {
      const code = document.getElementById('trade-code').value.trim();
      const amount = parseInt(document.getElementById('trade-amount').value);
      if (!code || !amount) { alert('请输入代码和数量'); return; }
      
      // 简单验证
      let stock = stocksData.find(s => s.code === code);
      if (!stock) { alert('未找到股票'); return; }
      
      const total = stock.price * amount;
      if (action === 'buy') {
        if (total > portfolioData.cash) { alert('现金不足'); return; }
        // 更新持仓
        let pos = portfolioData.positions.find(p => p.code === code);
        if (pos) {
          const newAmount = pos.amount + amount;
          pos.cost = (pos.cost * pos.amount + stock.price * amount) / newAmount;
          pos.amount = newAmount;
        } else {
          portfolioData.positions.push({
            code: code, name: stock.name, cost: stock.price, price: stock.price, amount: amount, profit: 0, profit_pct: 0
          });
        }
        portfolioData.cash -= total;
        alert('买入成功: ' + stock.name + ' x ' + amount);
      } else {
        let pos = portfolioData.positions.find(p => p.code === code);
        if (!pos) { alert('未持有该股票'); return; }
        if (amount > pos.amount) { alert('持仓不足'); return; }
        portfolioData.cash += total;
        pos.amount -= amount;
        if (pos.amount === 0) portfolioData.positions = portfolioData.positions.filter(p => p.code !== code);
        alert('卖出成功: ' + stock.name + ' x ' + amount);
      }
      
      // 重新计算盈亏
      portfolioData.total_value = portfolioData.positions.reduce((sum, p) => sum + p.price * p.amount, 0);
      portfolioData.total_assets = portfolioData.cash + portfolioData.total_value;
      portfolioData.positions.forEach(p => {
        p.profit = (p.price - p.cost) * p.amount;
        p.profit_pct = (p.price - p.cost) / p.cost * 100;
      });
      const cost = portfolioData.positions.reduce((sum, p) => sum + p.cost * p.amount, 0);
      portfolioData.total_profit = portfolioData.total_value - cost;
      portfolioData.total_profit_pct = cost > 0 ? portfolioData.total_profit / cost * 100 : 0;
      
      closeTradeModal();
      renderPortfolio();
    }

    // 初始化
    renderIndices();
    renderSignals();
    renderStocks();
    renderFunds();
    renderPortfolio();
  </script>
</body>
</html>
